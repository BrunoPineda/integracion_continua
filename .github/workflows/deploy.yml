name: 🚀 CI/CD Pipeline

on:
  push:
    branches:
      - main

# Evita deploys simultáneos — cancela el anterior si llega uno nuevo
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar ESLint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2: Test
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 3: Build
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar TypeScript
        run: npm run build

      - name: Subir artefactos del build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 4: Deploy (SSH → git pull en el servidor)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚢 Deploy a Producción
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Desplegar en el servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            echo "📂 Entrando al directorio del proyecto..."
            cd ${{ secrets.PROJECT_PATH }}

            echo "⬇️ Descargando últimos cambios de main..."
            git pull origin main

            echo "📦 Instalando dependencias de producción..."
            npm ci --omit=dev

            echo "🏗️ Compilando TypeScript..."
            npm run build

            echo "♻️ Reiniciando el servicio con PM2..."
            pm2 reload ${{ secrets.PM2_APP_NAME }} --update-env

            echo "✅ Deploy completado exitosamente."

      - name: Notificar resultado del deploy
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deploy exitoso en $(date)"
          else
            echo "❌ Deploy fallido en $(date)"
          fi
